<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Prototip Serp</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: #1a1a1a;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Courier New', monospace;
    touch-action: manipulation;
  }
  #wrap {
    position: relative;
    width: 100vw; height: 100vh;
    max-width: 480px;
    background: #c98a3c;
  }
  canvas { display: block; width: 100%; height: 100%; position: relative; z-index: 1; }
  #hud {
    position: absolute; top: 12px; left: 0; right: 0;
    display: flex; justify-content: space-between; padding: 0 16px;
    color: white; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 0 rgba(0,0,0,0.4);
    pointer-events: none; z-index: 5;
  }
  #staminaWrap {
    position: absolute; top: 48px; left: 16px; right: 16px;
    height: 18px; border-radius: 9px; background: rgba(0,0,0,0.45);
    border: 2px solid rgba(0,0,0,0.6);
    overflow: hidden; pointer-events: none; z-index: 5;
  }
  #staminaBar {
    height: 100%; width: 100%;
    background: linear-gradient(90deg, #e6c93a, #6bbf3a);
  }
  #overlay {
    position: absolute; inset: 0; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.55); color: white; text-align: center;
    font-size: 18px; gap: 10px; z-index: 10;
  }
  #overlay h1 { font-size: 28px; margin: 0; }
  #overlay p { margin: 4px 0; opacity: 0.9; }
  #overlay small { opacity: 0.7; }
  #menuOverlay {
    position: absolute; inset: 0; z-index: 8;
    display: flex; flex-direction: column;
  }
  .menuThird { flex: 1; display: flex; align-items: center; justify-content: center; }
  #menuTitle {
    font-size: 15vw; max-font-size: 64px; font-weight: bold; color: #ffffff;
    letter-spacing: 4px; text-shadow: 4px 4px 0 rgba(0,0,0,0.45);
    font-family: 'Courier New', monospace;
  }
  #menuStart {
    font-size: 18px; color: white; letter-spacing: 2px; font-weight: bold;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.4); animation: blink 1.3s infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  #recordEntry { display: none; }
  #initialsInput {
    width: 70px; font-size: 20px; text-align: center; text-transform: uppercase;
    padding: 6px; border-radius: 6px; border: none; margin-right: 8px;
    font-family: 'Courier New', monospace; letter-spacing: 3px;
  }
  #saveRecordBtn, #restartBtn {
    font-family: 'Courier New', monospace; font-weight: bold; font-size: 15px;
    padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
    background: #6bbf3a; color: #1a3a0f;
  }
  #restartBtn { margin-top: 14px; }
  #leaderboard { margin-top: 10px; font-size: 15px; }
  #leaderboard .recordRow { margin: 2px 0; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="menuOverlay">
    <div class="menuThird"><div id="menuTitle">SERPENS</div></div>
    <div class="menuThird"></div>
    <div class="menuThird"><div id="menuStart">TOUCH TO START</div></div>
  </div>
  <div id="hud">
    <span id="score">🍎 0</span>
    <span id="dist">0 m</span>
  </div>
  <div id="staminaWrap">
    <div id="staminaBar"></div>
  </div>
  <div id="overlay">
    <h1 id="overlayTitle">GAME OVER</h1>
    <p id="finalStats"></p>
    <div id="recordEntry">
      <p style="margin:6px 0;">New record! Initials:</p>
      <input id="initialsInput" maxlength="3" autocapitalize="characters" placeholder="AAA" />
      <button id="saveRecordBtn">Save</button>
    </div>
    <div id="leaderboard"></div>
    <button id="restartBtn">Play again</button>
  </div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('wrap');
const scoreEl = document.getElementById('score');
const distEl = document.getElementById('dist');
const overlay = document.getElementById('overlay');
const finalStats = document.getElementById('finalStats');
const staminaBar = document.getElementById('staminaBar');
const recordEntry = document.getElementById('recordEntry');
const initialsInput = document.getElementById('initialsInput');
const saveRecordBtn = document.getElementById('saveRecordBtn');
const leaderboardEl = document.getElementById('leaderboard');
const restartBtn = document.getElementById('restartBtn');
const menuOverlay = document.getElementById('menuOverlay');
const hudEl = document.getElementById('hud');
const staminaWrapEl = document.getElementById('staminaWrap');
let records = [];
let inMenu = true;
let menuTimer = 0;

let W, H;
function resize() {
  W = wrap.clientWidth; H = wrap.clientHeight;
  canvas.width = W; canvas.height = H;
}
resize();
window.addEventListener('resize', resize);

// ---- Game state ----
let head, dirSign, curDir, pathHistory, obstacles, apples, score, distance, scrollSpeed, running, stoneSpawnTimer, appleSpawnTimer, elapsed;

const BASE_HEAD_R = 19.2;
const BASE_SEG_R = 16.8;
const SEG_SPACING = 4; // frames between recorded path samples per segment gap
const BASE_SPEED = 2.4;
const MAX_LATERAL = 3.2;
const TURN_EASE = 0.06;

let numSegments, stamina;
const STAMINA_MAX = 100;
const STAMINA_DRAIN_RATE = 0.45; // constant, sense progressió
const STAMINA_PER_APPLE = 22;
const headR = BASE_HEAD_R;
const segR = BASE_SEG_R;
const STONE_R = 15 * 1.55; // pedres a mida fixa des del principi

function reset() {
  head = { x: W / 2, y: H - H / 3.4 };
  dirSign = 1;
  curDir = 0;
  stamina = STAMINA_MAX;
  // enough segments so the tail is always cropped by the bottom edge, never visible
  numSegments = Math.ceil((H - head.y) / (BASE_SEG_R * 1.3)) + 4;
  pathHistory = new Array(numSegments * SEG_SPACING + 10).fill(head.x);
  obstacles = [];
  apples = [];
  score = 0;
  distance = 0;
  scrollSpeed = BASE_SPEED;
  stoneSpawnTimer = 130;
  appleSpawnTimer = 150;
  elapsed = 0;
  running = true;
  overlay.style.display = 'none';
  updateHUD();
}

function updateHUD() {
  scoreEl.textContent = '🍎 ' + score;
  distEl.textContent = Math.floor(distance) + ' m';
  const pct = Math.max(0, stamina / STAMINA_MAX) * 100;
  staminaBar.style.width = pct + '%';
  staminaBar.style.background = pct < 25
    ? '#d2372c'
    : 'linear-gradient(90deg, #e6c93a, #6bbf3a)';
}

function spawnStone() {
  const margin = 30;
  const x = margin + Math.random() * (W - margin * 2);
  obstacles.push({ x, y: -20, r: STONE_R });
}

function spawnApple() {
  const margin = 30;
  const x = margin + Math.random() * (W - margin * 2);
  apples.push({ x, y: -20, r: 15 });
}

async function loadRecords() {
  try {
    const res = await window.storage.get('highscores', false);
    records = res && res.value ? JSON.parse(res.value) : [];
  } catch (e) {
    records = [];
  }
}

async function persistRecords() {
  try {
    await window.storage.set('highscores', JSON.stringify(records), false);
  } catch (e) { /* best effort, no bloquem el joc si falla */ }
}

function renderLeaderboard() {
  if (!records.length) {
    leaderboardEl.innerHTML = '<p style="opacity:0.7;font-size:14px;">No records yet</p>';
    return;
  }
  leaderboardEl.innerHTML = '<p style="font-weight:bold;margin-bottom:4px;">Best runs</p>' +
    records.map((r, i) => `<div class="recordRow">${i + 1}. ${r.initials} — ${r.meters} m</div>`).join('');
}

function handleGameOverRecords(finalMeters) {
  const qualifies = records.length < 3 || finalMeters > records[records.length - 1].meters;
  if (qualifies) {
    recordEntry.style.display = 'block';
    initialsInput.value = '';
  } else {
    recordEntry.style.display = 'none';
  }
  saveRecordBtn.onclick = async () => {
    let initials = (initialsInput.value || '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 3);
    if (!initials) initials = '???';
    records.push({ initials, meters: finalMeters });
    records.sort((a, b) => b.meters - a.meters);
    records = records.slice(0, 3);
    await persistRecords();
    recordEntry.style.display = 'none';
    renderLeaderboard();
  };
  renderLeaderboard();
}

function initSnakePose() {
  head = { x: W / 2, y: H - H / 3.4 };
  dirSign = 1;
  curDir = 0;
  numSegments = Math.ceil((H - head.y) / (BASE_SEG_R * 1.3)) + 4;
  pathHistory = new Array(numSegments * SEG_SPACING + 10).fill(head.x);
  obstacles = [];
  apples = [];
}

function updateMenuSway() {
  menuTimer++;
  const amplitude = Math.min(60, W * 0.22);
  head.x = W / 2 + Math.sin(menuTimer * 0.035) * amplitude;
  pathHistory.push(head.x);
  if (pathHistory.length > numSegments * SEG_SPACING + 15) pathHistory.shift();
}

function startGame() {
  inMenu = false;
  menuOverlay.style.display = 'none';
  hudEl.style.display = 'flex';
  staminaWrapEl.style.display = 'block';
  reset();
}

function dist2(ax, ay, bx, by) {
  const dx = ax - bx, dy = ay - by;
  return dx * dx + dy * dy;
}

function update() {
  if (!running) return;
  elapsed++;

  // difficulty ramps up slowly: only speed grows; stones and snake stay fixed size
  const t = Math.min(elapsed / 2400, 1); // 0 -> 1 over ~40s at 60fps
  scrollSpeed = BASE_SPEED + t * 3.2;

  // ease lateral direction toward target
  curDir += (dirSign - curDir) * TURN_EASE;
  head.x += curDir * MAX_LATERAL;

  // touching either side wall ends the game
  if (head.x - headR <= 0 || head.x + headR >= W) {
    gameOver();
    return;
  }

  // record path history for the body to follow
  pathHistory.push(head.x);
  if (pathHistory.length > numSegments * SEG_SPACING + 15) pathHistory.shift();

  const metersThisFrame = scrollSpeed * 0.08;
  distance += metersThisFrame;
  stamina -= metersThisFrame * STAMINA_DRAIN_RATE;
  if (stamina <= 0) {
    stamina = 0;
    gameOver();
    return;
  }

  // stones: start sparse, appear one at a time, slowly get more frequent
  stoneSpawnTimer -= 1;
  if (stoneSpawnTimer <= 0) {
    spawnStone();
    stoneSpawnTimer = 130 - t * 75; // 130 frames -> 55 frames between stones
  }
  // apples: independent rhythm, also start sparse and become more frequent
  appleSpawnTimer -= 1;
  if (appleSpawnTimer <= 0) {
    spawnApple();
    appleSpawnTimer = 150 - t * 70; // 150 frames -> 80 frames between apples
  }

  // move world objects down, check collisions
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.y += scrollSpeed;
    if (o.y > H + 40) { obstacles.splice(i, 1); continue; }
    if (dist2(o.x, o.y, head.x, head.y) < (o.r + headR - 6) ** 2) {
      gameOver();
      return;
    }
  }
  for (let i = apples.length - 1; i >= 0; i--) {
    const a = apples[i];
    a.y += scrollSpeed;
    if (a.y > H + 40) { apples.splice(i, 1); continue; }
    if (dist2(a.x, a.y, head.x, head.y) < (a.r + headR - 4) ** 2) {
      score++;
      stamina = Math.min(STAMINA_MAX, stamina + STAMINA_PER_APPLE);
      apples.splice(i, 1);
    }
  }

  updateHUD();
}

function gameOver() {
  running = false;
  finalStats.textContent = `🍎 ${score}   •   ${Math.floor(distance)} m`;
  overlay.style.display = 'flex';
  handleGameOverRecords(Math.floor(distance));
}

function drawBackground() {
  ctx.fillStyle = '#c98a3c';
  ctx.fillRect(0, 0, W, H);
}

function drawSnake() {
  // body segments trail behind head, spaced from recorded path history — always enough to reach the bottom edge, tail never visible
  for (let i = numSegments; i >= 1; i--) {
    const idx = pathHistory.length - 1 - i * SEG_SPACING;
    const px = pathHistory[Math.max(idx, 0)];
    const py = head.y + i * (segR * 1.3);
    if (py > H + 20) continue;
    ctx.beginPath();
    ctx.fillStyle = '#5aa832';
    ctx.strokeStyle = '#1a3a0f';
    ctx.lineWidth = 3;
    ctx.arc(px, py, segR, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  }
  // head
  ctx.beginPath();
  ctx.fillStyle = '#6bbf3a';
  ctx.strokeStyle = '#1a3a0f';
  ctx.lineWidth = 3;
  ctx.arc(head.x, head.y, headR, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // eyes
  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(head.x - headR * 0.4, head.y - headR * 0.2, headR * 0.22, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(head.x + headR * 0.4, head.y - headR * 0.2, headR * 0.22, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'black';
  ctx.beginPath(); ctx.arc(head.x - headR * 0.4, head.y - headR * 0.2, headR * 0.09, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(head.x + headR * 0.4, head.y - headR * 0.2, headR * 0.09, 0, Math.PI * 2); ctx.fill();
}

function drawObstacles() {
  obstacles.forEach(o => {
    ctx.beginPath();
    ctx.fillStyle = '#8a8f96';
    ctx.strokeStyle = '#4a4e54';
    ctx.lineWidth = 2;
    ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  });
  apples.forEach(a => {
    ctx.beginPath();
    ctx.fillStyle = '#d2372c';
    ctx.strokeStyle = '#7a1a12';
    ctx.lineWidth = 2;
    ctx.arc(a.x, a.y, a.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#3a7d1f';
    ctx.fillRect(a.x - 2, a.y - a.r - 6, 4, 6);
  });
}

function draw() {
  drawBackground();
  drawObstacles();
  drawSnake();
}

function loop() {
  if (inMenu) {
    updateMenuSway();
  } else {
    update();
  }
  draw();
  requestAnimationFrame(loop);
}

function handleTap() {
  if (inMenu) { startGame(); return; }
  if (!running) return;
  dirSign *= -1;
}

canvas.addEventListener('click', handleTap);
menuOverlay.addEventListener('click', handleTap);
restartBtn.addEventListener('click', reset);

loadRecords();
initSnakePose();
hudEl.style.display = 'none';
staminaWrapEl.style.display = 'none';
loop();
</script>
</body>
</html>
